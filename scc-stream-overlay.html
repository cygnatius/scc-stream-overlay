<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shepparton Chess Club — Stream Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   SHEPPARTON CHESS CLUB — LIVE STREAM OVERLAY
   OBS Browser Source: 1920 x 1080. Theme matched to sheppartonchess.club.
   All live data lives in the STATE object near the bottom of this file.
   Wiring hooks (lichess feed + Pairingsman) are stubbed at the very bottom.
   ========================================================================== */
:root{
  --bg:#2E2028;          /* club body aubergine */
  --bg-deep:#1F151B;     /* club nav / darker */
  --panel:#3A2A33;       /* card panel */
  --panel-2:#241a20;     /* inner wells */
  --cream:#F1E7D3;       /* parchment banners */
  --cream-dim:#cdbfa6;   /* muted parchment text */
  --gold:#D9A13B;        /* primary accent */
  --brick:#A9603F;       /* rust/brick secondary (dates, rounds) */
  --ink:#2b2b3d;         /* dark serif text on cream */
  --line:rgba(217,161,59,.35);
  /* site wordmark face (Sitka ships with Windows, so OBS renders it); Playfair falls back */
  --word:'Sitka Small','Sitka Text','Sitka',sitka1,'Playfair Display',ui-serif,Georgia,serif;
  --display:'Playfair Display',sitka1,ui-serif,Georgia,serif;
  --sq-light:#E7D6B4;    /* board light square */
  --sq-dark:#6B4B39;     /* board dark square */
  --hi:rgba(217,161,59,.55); /* last-move highlight */
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-family:'Figtree',system-ui,sans-serif;color:var(--cream);
  -webkit-font-smoothing:antialiased}
/* faint vintage vignette to echo the site hero */
.stage::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(120% 90% at 30% 0%,rgba(0,0,0,0) 40%,rgba(0,0,0,.45) 100%);
  z-index:50}

.stage{position:relative;width:1920px;height:1080px;flex:none;
  transform-origin:center center;background:var(--bg);display:grid;
  grid-template-rows:84px 1fr 56px;
  grid-template-columns:1fr;
  padding:20px 34px;gap:16px}

/* ---------- angled parchment banner (site signature element) ---------- */
.banner{position:relative;display:inline-flex;align-items:center;
  background:var(--cream);color:var(--ink);
  font-family:'Playfair Display',serif;font-weight:800;
  letter-spacing:.14em;text-transform:uppercase;
  padding:8px 30px 10px 22px;
  clip-path:polygon(0 0,100% 0,calc(100% - 16px) 100%,0 100%);
  box-shadow:0 6px 14px rgba(0,0,0,.35)}
.banner.sm{font-size:16px;padding:6px 26px 8px 16px}
.banner::after{content:"";position:absolute;left:0;bottom:-4px;height:4px;
  width:100%;background:var(--gold)}

/* ===================== HEADER ===================== */
header{grid-row:1;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:18px}
.crest{height:70px;min-width:56px;border-radius:8px;background:var(--cream);
  display:flex;align-items:center;justify-content:center;padding:5px 9px;
  box-shadow:0 6px 14px rgba(0,0,0,.4);position:relative}
.crest img{height:100%;width:auto;object-fit:contain;display:block}
.brand h1{font-family:var(--word);font-weight:700;
  font-size:31px;letter-spacing:.12em;text-transform:uppercase;line-height:1}
.brand .sub{color:var(--gold);font-family:var(--word);font-weight:600;font-size:14px;
  letter-spacing:.2em;text-transform:uppercase;margin-top:7px}
.event{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.event .tname{font-family:var(--display);font-weight:800;font-size:26px}
.event .round{color:var(--bg);background:var(--gold);font-family:var(--word);font-weight:700;
  font-size:14px;letter-spacing:.14em;text-transform:uppercase;
  padding:4px 14px;border-radius:3px}

/* ===================== MAIN ===================== */
main{grid-row:2;display:grid;grid-template-columns:820px 500px;justify-content:center;gap:32px;min-height:0}

/* ---- board column: Black card · board · White card ---- */
.boardwrap{display:flex;flex-direction:column;justify-content:center;gap:12px;min-height:0}
.board{--n:8;position:relative;height:min(740px,100%);aspect-ratio:1/1;
  flex:0 1 auto;min-height:0;margin:0 auto;
  border:6px solid var(--cream);border-radius:6px;overflow:hidden;
  box-shadow:0 18px 40px rgba(0,0,0,.55);display:grid;
  grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr)}
.sq{position:relative;display:grid;place-items:center}
.sq.light{background:var(--sq-light)}
.sq.dark{background:var(--sq-dark)}
.sq.hi::before{content:"";position:absolute;inset:0;background:var(--hi)}
.sq .pc{position:relative;font-size:82px;line-height:1;z-index:2;
  font-family:'Segoe UI Symbol','Noto Sans Symbols2','Arial Unicode MS',sans-serif}
.pc.w{color:#FBF6EC;text-shadow:0 0 1px #000,0 2px 3px rgba(0,0,0,.5),
  -1.5px -1.5px 0 #6b5638,1.5px -1.5px 0 #6b5638,-1.5px 1.5px 0 #6b5638,1.5px 1.5px 0 #6b5638}
.pc.b{color:#241a20;text-shadow:0 1px 2px rgba(0,0,0,.6),
  -1px -1px 0 #d9c6a6,1px -1px 0 #d9c6a6,-1px 1px 0 #d9c6a6,1px 1px 0 #d9c6a6}
.coord{position:absolute;font-size:15px;font-weight:800;opacity:.75;z-index:3;
  font-family:'Figtree',sans-serif}
.coord.file{right:5px;bottom:3px}
.coord.rank{left:5px;top:3px}
.coord.on-light{color:#6B4B39}.coord.on-dark{color:#E7D6B4}

/* ---- right column: moves + sponsors ---- */
.side{display:flex;flex-direction:column;gap:16px;min-height:0}

/* player card — slim horizontal bar that flanks the board (top=Black, bottom=White) */
.pcard{flex:none;background:var(--panel);border:1px solid rgba(241,231,211,.14);
  border-radius:10px;padding:7px 16px;display:grid;
  grid-template-columns:48px 1fr auto;column-gap:14px;
  align-items:center;position:relative;overflow:hidden}
.pcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--cream)}
.pcard.active::before{background:var(--gold)}
.pcard.active{box-shadow:0 0 0 2px var(--gold) inset,0 10px 24px rgba(0,0,0,.35)}
.avatar{width:48px;height:48px;border-radius:8px;
  background:var(--panel-2);border:2px solid var(--cream);overflow:hidden;
  display:grid;place-items:center;font-family:'Playfair Display',serif;
  font-weight:800;font-size:20px;color:var(--cream-dim)}
.avatar img{width:100%;height:100%;object-fit:cover}
.pinfo{min-width:0;display:flex;flex-direction:column;gap:3px}
.pname{font-family:var(--display);font-weight:800;font-size:25px;
  line-height:1.0;display:flex;align-items:center;gap:10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptitle{font-size:13px;font-weight:800;color:var(--bg);background:var(--gold);
  padding:2px 7px;border-radius:3px;letter-spacing:.05em}
.pmeta{display:flex;align-items:center;gap:16px;font-size:14px;color:var(--cream-dim)}
.pmeta b{color:var(--cream);font-weight:700}
.pmeta .rec{color:var(--gold);font-weight:800}
.clock{justify-self:end;align-self:center;
  font-family:'Figtree',sans-serif;font-variant-numeric:tabular-nums;
  font-weight:800;font-size:35px;letter-spacing:.02em;
  background:var(--panel-2);color:var(--cream);
  padding:5px 16px;border-radius:8px;min-width:166px;text-align:center;
  border:1px solid rgba(241,231,211,.12)}
.pcard.active .clock{background:var(--gold);color:var(--bg-deep)}
.clock.low{color:#e7a; }
.flag{font-size:20px}

/* moves */
.moves{flex:1;min-height:0;background:var(--panel);
  border:1px solid rgba(241,231,211,.14);border-radius:10px;
  display:flex;flex-direction:column;overflow:hidden}
.moves .cap{padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(241,231,211,.12)}
.moves .cap .t{font-family:var(--word);font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;font-size:16px;color:var(--cream)}
.moves .cap .st{font-family:var(--word);font-size:13px;color:var(--gold);font-weight:600;letter-spacing:.12em;text-transform:uppercase}
.mlist{flex:1;overflow:hidden;padding:12px 20px;
  display:grid;grid-template-columns:46px 1fr 1fr;
  align-content:start;gap:6px 12px;font-size:23px;
  font-variant-numeric:tabular-nums}
.mno{color:var(--cream-dim);text-align:right;padding:6px 8px;font-weight:700}
.mv{padding:6px 12px;border-radius:5px;font-weight:600}
.mv.cur{background:var(--gold);color:var(--bg-deep);font-weight:800}

/* ---- sponsors (right column, under the moves) — 0 / 1 / many ---- */
.sponsors{flex:none;background:var(--panel);
  border:1px solid rgba(241,231,211,.14);border-radius:10px;
  display:flex;flex-direction:column;overflow:hidden}
.sponsors[hidden]{display:none}   /* author display:flex would otherwise defeat [hidden] */
.sponsors .cap{padding:10px 16px 8px;border-bottom:1px solid rgba(241,231,211,.12)}
.sponsors .cap .t{font-family:var(--word);font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;font-size:15px;color:var(--cream)}
.slogo{position:relative;flex:1;min-height:132px;margin:12px;border-radius:8px;
  background:var(--cream);display:grid;place-items:center;overflow:hidden}
.slogo .item{position:absolute;inset:16px;display:grid;place-items:center;
  opacity:0;transition:opacity .6s ease}
.slogo .item.show{opacity:1}
.slogo img{max-width:100%;max-height:100%;object-fit:contain}
.slogo .sname{color:var(--ink);font-family:var(--display);font-weight:800;
  font-size:30px;text-align:center;letter-spacing:.01em;padding:0 10px}

/* ---- funder credit (Council grant acknowledgement — always on) ---- */
/* White logo on the deep-dark panel per GSCC accessibility guidance (never a  */
/* dark logo on a dark bg). Padding gives the logo its required clear space;    */
/* the logo is used as supplied — not recoloured, stretched or altered.         */
.funder{flex:none;background:var(--bg-deep);border:1px solid rgba(241,231,211,.10);
  border-radius:10px;padding:14px 22px;display:flex;align-items:center;
  justify-content:center;gap:24px}
.funder[hidden]{display:none}
.funder .ftext{font-family:var(--word);font-weight:600;font-size:16px;
  line-height:1.35;letter-spacing:.02em;color:var(--cream);max-width:520px}
.funder .flogo{height:58px;width:auto;flex:none;display:block}

/* ===================== FOOTER ===================== */
footer{grid-row:3;display:flex;align-items:center;justify-content:space-between;
  background:var(--bg-deep);border:1px solid rgba(241,231,211,.1);
  border-radius:10px;padding:0 22px}
.live{display:flex;align-items:center;gap:12px;font-family:var(--word);font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;font-size:15px}
.dot{width:13px;height:13px;border-radius:50%;background:#e23b3b;
  box-shadow:0 0 0 0 rgba(226,59,59,.6);animation:pulse 1.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(226,59,59,.6)}70%{box-shadow:0 0 0 12px rgba(226,59,59,0)}100%{box-shadow:0 0 0 0 rgba(226,59,59,0)}}
.channels{display:flex;align-items:center;gap:22px;color:var(--cream-dim);
  font-weight:700;font-size:16px;letter-spacing:.04em}
.channels b{color:var(--gold)}
.foot-club{font-family:var(--word);font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;font-size:17px;color:var(--cream)}
.board-tag{font-family:var(--word);color:var(--gold);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:14px}
</style>
</head>
<body>
<div class="stage">

  <!-- ============ HEADER ============ -->
  <header>
    <div class="brand">
      <div class="crest"><img src="https://sheppartonchess.club/img/light/Clear.png" alt="Shepparton Chess Club"></div>
      <div>
        <h1>Shepparton Chess Club</h1>
        <div class="sub" id="hdrVenue">Shepparton Mechanics Institute</div>
      </div>
    </div>
    <div class="event">
      <div class="tname" id="hdrTournament">Club Championship 2026</div>
      <div class="round" id="hdrRound">Round 4 · Board 1</div>
    </div>
  </header>

  <!-- ============ MAIN ============ -->
  <main>
    <!-- board column: Black (top) · board · White (bottom) -->
    <div class="boardwrap">
      <!-- top player (Black) -->
      <div class="pcard" id="cardBlack">
        <div class="avatar" id="avBlack"></div>
        <div class="pinfo">
          <div class="pname"><span id="nmBlack">—</span><span class="ptitle" id="tiBlack" hidden></span></div>
          <div class="pmeta">
            <span>Rating <b id="rtBlack">—</b></span>
            <span>Record <span class="rec" id="rcBlack">—</span></span>
          </div>
        </div>
        <div class="clock" id="clkBlack">—:—:—</div>
      </div>

      <div class="board" id="board"></div>

      <!-- bottom player (White) -->
      <div class="pcard active" id="cardWhite">
        <div class="avatar" id="avWhite"></div>
        <div class="pinfo">
          <div class="pname"><span id="nmWhite">—</span><span class="ptitle" id="tiWhite" hidden></span></div>
          <div class="pmeta">
            <span>Rating <b id="rtWhite">—</b></span>
            <span>Record <span class="rec" id="rcWhite">—</span></span>
          </div>
        </div>
        <div class="clock" id="clkWhite">—:—:—</div>
      </div>
    </div>

    <!-- right column: moves + sponsors -->
    <div class="side">
      <div class="moves">
        <div class="cap"><span class="t">Moves</span><span class="st" id="mvStatus">Black to move</span></div>
        <div class="mlist" id="mlist"></div>
      </div>

      <!-- sponsor area: hidden when STATE.sponsors is empty -->
      <div class="sponsors" id="sponsors" hidden>
        <div class="cap"><span class="t">Proudly supported by</span></div>
        <div class="slogo" id="slogo"></div>
      </div>

      <!-- Council grant credit: always on; edit/disable via STATE.funder -->
      <div class="funder" id="funder" hidden>
        <div class="ftext" id="ftext"></div>
        <img class="flogo" id="flogo" alt="Greater Shepparton City Council">
      </div>
    </div>
  </main>

  <!-- ============ FOOTER ============ -->
  <footer>
    <div class="live"><span class="dot"></span> Live</div>
    <div class="channels">
      Watch the board live on <b>chess.com</b> &nbsp;·&nbsp; <b>lichess.org</b>
    </div>
    <div class="foot-club">sheppartonchess.club</div>
    <div class="board-tag" id="footBoard">Board 1</div>
  </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

/* ---- board rendering -------------------------------------------------- */
/* both sides use the SOLID glyph shapes; colour (.pc.w cream / .pc.b dark) tells them apart */
const GLYPH = {K:"♚",Q:"♛",R:"♜",B:"♝",N:"♞",P:"♟",k:"♚",q:"♛",r:"♜",b:"♝",n:"♞",p:"♟"};
const FILES = ["a","b","c","d","e","f","g","h"];

function squareName(col,row){ return FILES[col] + (8-row); }

function renderBoard(){
  const el = document.getElementById("board");
  el.innerHTML = "";
  const rows = STATE.fen.split(" ")[0].split("/");
  for(let r=0;r<8;r++){
    let c=0;
    const cells=[];
    for(const ch of rows[r]){
      if(/\d/.test(ch)){ for(let k=0;k<+ch;k++){cells.push(null);c++;} }
      else { cells.push(ch); c++; }
    }
    for(let col=0;col<8;col++){
      const piece=cells[col];
      const isLight=(r+col)%2===0;
      const name=squareName(col,r);
      const sq=document.createElement("div");
      sq.className="sq "+(isLight?"light":"dark");
      if(STATE.lastMove && (STATE.lastMove.from===name||STATE.lastMove.to===name)) sq.classList.add("hi");
      if(piece){
        const p=document.createElement("div");
        p.className="pc "+(piece===piece.toUpperCase()?"w":"b");
        p.textContent=GLYPH[piece];
        sq.appendChild(p);
      }
      // coordinates: files on bottom rank, ranks on left file
      if(r===7){const f=document.createElement("div");f.className="coord file "+(isLight?"on-light":"on-dark");f.textContent=FILES[col];sq.appendChild(f);}
      if(col===0){const rk=document.createElement("div");rk.className="coord rank "+(isLight?"on-light":"on-dark");rk.textContent=(8-r);sq.appendChild(rk);}
      el.appendChild(sq);
    }
  }
}

/* ---- moves list ------------------------------------------------------- */
function renderMoves(){
  const el=document.getElementById("mlist"); el.innerHTML="";
  const pairs=Math.ceil(STATE.moves.length/2);
  for(let i=0;i<pairs;i++){
    const no=document.createElement("div"); no.className="mno"; no.textContent=(i+1)+".";
    el.appendChild(no);
    for(let s=0;s<2;s++){
      const ply=i*2+s;
      const cell=document.createElement("div");
      if(ply<STATE.moves.length){
        cell.className="mv"+(ply===STATE.currentPly?" cur":"");
        cell.textContent=STATE.moves[ply];
      } else { cell.className="mv"; cell.textContent=""; }
      el.appendChild(cell);
    }
  }
  // keep newest visible
  el.scrollTop = el.scrollHeight;
}

/* ---- sponsors --------------------------------------------------------- */
/* Reads STATE.sponsors (0/1/many). Empty -> panel hidden. One -> static.     */
/* Many -> cross-fade rotation every STATE.sponsorRotateMs. Call once at boot. */
let SP_TIMER=null, SP_IDX=0;
function sponsorItem(s){ return (typeof s==="string") ? {img:s} : (s||{}); }
function renderSponsors(){
  const panel=document.getElementById("sponsors");
  const box=document.getElementById("slogo");
  const list=Array.isArray(STATE.sponsors)?STATE.sponsors.filter(Boolean):[];
  if(SP_TIMER){ clearInterval(SP_TIMER); SP_TIMER=null; }
  box.innerHTML="";
  if(list.length===0){ panel.hidden=true; return; }   // no sponsors -> moves fill the column
  panel.hidden=false;
  list.forEach((s,i)=>{
    const it=sponsorItem(s);
    const d=document.createElement("div"); d.className="item"+(i===0?" show":"");
    if(it.img){ const im=document.createElement("img"); im.src=it.img; im.alt=it.name||""; d.appendChild(im); }
    else { const n=document.createElement("div"); n.className="sname"; n.textContent=it.name||""; d.appendChild(n); }
    box.appendChild(d);
  });
  SP_IDX=0;
  if(list.length>1){                                   // rotate through the logos
    const items=box.querySelectorAll(".item");
    SP_TIMER=setInterval(()=>{
      items[SP_IDX].classList.remove("show");
      SP_IDX=(SP_IDX+1)%items.length;
      items[SP_IDX].classList.add("show");
    }, Math.max(2000, STATE.sponsorRotateMs||8000));
  }
}

/* ---- funder credit ---------------------------------------------------- */
/* Council grant acknowledgement (STATE.funder). Static — build once at boot. */
function renderFunder(){
  const el=document.getElementById("funder");
  const f=STATE.funder;
  if(!f || (!f.logo && !f.text)){ el.hidden=true; return; }   // null/empty -> hidden
  const t=document.getElementById("ftext"), im=document.getElementById("flogo");
  t.textContent=f.text||""; t.hidden=!f.text;
  if(f.logo){ im.src=f.logo; im.hidden=false; } else { im.hidden=true; }
  el.hidden=false;
}

/* ---- player cards ----------------------------------------------------- */
function initials(name){return name.split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function fillPlayer(side){
  const p=STATE[side], suf=side==="white"?"White":"Black";
  document.getElementById("nm"+suf).textContent=p.name||"—";
  document.getElementById("rt"+suf).textContent=p.rating||"—";
  document.getElementById("rc"+suf).textContent=p.record||"—";
  document.getElementById("clk"+suf).textContent = (p.sec!=null ? fmtSec(p.sec) : (p.clock||"—:—:—"));
  const ti=document.getElementById("ti"+suf);
  if(p.title){ti.textContent=p.title;ti.hidden=false;} else ti.hidden=true;
  const av=document.getElementById("av"+suf);
  if(p.avatar){av.innerHTML='<img src="'+p.avatar+'" alt="">';}
  else {av.textContent=initials(p.name||"?");}
}

/* ---- master render ---------------------------------------------------- */
function render(){
  document.getElementById("hdrVenue").textContent=STATE.venue;
  document.getElementById("hdrTournament").textContent=STATE.tournament;
  document.getElementById("hdrRound").textContent=STATE.round+" · "+STATE.boardNo;
  document.getElementById("footBoard").textContent=STATE.boardNo;
  document.getElementById("mvStatus").textContent=(STATE.toMove==="w"?"White":"Black")+" to move";
  renderBoard(); renderMoves(); fillPlayer("white"); fillPlayer("black");
  document.getElementById("cardWhite").classList.toggle("active",STATE.toMove==="w");
  document.getElementById("cardBlack").classList.toggle("active",STATE.toMove==="b");
}
render();
renderSponsors();   // sponsors are static config — build once, not on every board update
renderFunder();     // Council grant credit — static, build once

/* scale the fixed 1920x1080 canvas to fit the window; OBS at 1920x1080 renders it 1:1 */
function fitStage(){
  const s=Math.min(window.innerWidth/1920, window.innerHeight/1080);
  document.querySelector('.stage').style.transform='scale('+s+')';
}
window.addEventListener('resize', fitStage);
fitStage();

/* ---- ticking clocks ---------------------------------------------------- */
/* The DGT clock feed only changes at move-end, so we tick the side-to-move   */
/* down locally every second and re-sync to the real value ONLY when it        */
/* changes (see the LiveChess handler). In manual mode, set each player's      */
/* starting time in STATE (e.g. clock:"1:30:00"); it switches on every move.   */
function parseClock(s){ if(typeof s!=="string") return null; const p=s.split(":").map(Number); if(p.some(n=>isNaN(n))) return null; return p.reduce((a,n)=>a*60+n,0); }
function fmtSec(t){ t=Math.max(0,Math.round(t)); const h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60; return h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0"); }
function paintClocks(){
  if(STATE.white.sec!=null) document.getElementById("clkWhite").textContent=fmtSec(STATE.white.sec);
  if(STATE.black.sec!=null) document.getElementById("clkBlack").textContent=fmtSec(STATE.black.sec);
}
STATE.white.sec = parseClock(STATE.white.clock);
STATE.black.sec = parseClock(STATE.black.clock);
paintClocks();
// Which side's clock is actually running, per the DGT feed ('w' | 'b' | null).
// null — before the game starts, or while both clocks are stopped between moves —
// means nothing ticks; the displayed times just hold. This is set from the
// LiveChess clock message (see the handler in connectLiveChess below).
let CLOCK_RUN_SIDE = null;
setInterval(function(){
  if(!CLOCK_RUN_SIDE) return;                 // no clock running -> don't count down
  const side = CLOCK_RUN_SIDE==="w" ? STATE.white : STATE.black;
  if(side.sec!=null && side.sec>0){ side.sec-=1; paintClocks(); }
}, 1000);

/* =========================================================================
   LIVE WIRING  —  fill CONFIG, save, reload the OBS browser source.
   • pairingsman.enabled is the MASTER TOGGLE for the Pairingsman integration.
       false → MANUAL: the overlay shows the players you typed in STATE.
       true  → AUTO:   names / ratings / round / tournament / record come from
               the Pairingsman API (needs token + meetingId).
   • Leave livechess.host blank to keep the demo board (handy for previewing).
   • KEEP THIS FILE PRIVATE IF YOU FILL IN A TOKEN — it's a secret.
   • DGT LiveChess gives the board / moves / clocks (your LAN), in both modes.
   ========================================================================= */
const CONFIG = {
  boardNumber: 1,                    // which board/table this overlay is for (Pairingsman pairing match)

  pairingsman: {
    enabled: false,                  // ◄ MASTER TOGGLE. false = manual (type players in STATE above).
                                     //   true (+ token + meetingId) = auto-fill from Pairingsman.
    base: "https://pairingsman.com/api/v1",
    token: "",                       // Bearer token; required when enabled
    meetingId: null,                 // tonight's meeting id, e.g. 210
    tournamentId: null,              // optional — auto-read from the pairing if null
    rosterEverySec: 10,
    standingsEverySec: 30
  },

  livechess: {
    host: "192.168.0.92:1982",                        // LiveChess machine on your LAN, e.g. "192.168.1.50:1982"; blank = keep demo board
    serialnr: 3000150100,                  // optional — auto-picks the ACTIVE board if null
    pollMs: 800
  }
};

/* ---------- PAIRINGSMAN (names, ratings, round, tournament, record) ------ */
async function pmFetch(path){
  const r = await fetch(CONFIG.pairingsman.base + path, {
    headers:{ "Authorization":"Bearer "+CONFIG.pairingsman.token, "Accept":"application/json" }
  });
  if(!r.ok) throw new Error("Pairingsman "+path+" -> "+r.status);
  return r.json();
}
function fmtPts(x){
  const n=Number(x); if(Number.isNaN(n)) return String(x);
  const w=Math.floor(n), f=n-w;
  const frac = f===0.5 ? "½" : (f ? String(+f.toFixed(1)).replace("0.",".") : "");
  return (w||!frac ? String(w) : "") + frac;
}
let PM_STANDINGS = {};   // participantId -> standings row
function mapPlayer(dst, src){
  if(!src) return;
  dst.name   = src.name != null ? src.name : dst.name;
  dst.rating = src.overall_rating != null ? src.overall_rating : "";
  dst.title  = "";        // API sample carries no title/flag/avatar — keep slots reserved
}
function applyRecord(dst, pid){
  const row = PM_STANDINGS[pid];
  if(!row){ dst.record = "—"; return; }
  const pts = row.points ?? row.score ?? row.total ?? row.pts ?? null;
  const gp  = row.games ?? row.games_played ?? row.played ?? row.gp ?? null;
  dst.record = pts==null ? "—" : (gp!=null ? fmtPts(pts)+" / "+gp : fmtPts(pts));
}
async function fetchTournament(id){
  try{ const j=await pmFetch("/tournaments/"+id); const t=j.data||j;
       if(t.name){ STATE.tournament=t.name; render(); } }catch(e){ console.warn(e); }
}
let PM_TID=null, PM_TOURFETCHED=false;
async function pollPairingsman(){
  try{
    const j = await pmFetch("/meetings/"+CONFIG.pairingsman.meetingId+"/pairings");
    const p = (j.data||[]).find(x => x.table === CONFIG.boardNumber);
    if(!p) return;                                   // no game on this board yet
    STATE.round   = "Round "+p.round;
    STATE.boardNo = "Board "+p.table;
    PM_TID = CONFIG.pairingsman.tournamentId || (p.tournament && p.tournament.id) || PM_TID;
    mapPlayer(STATE.white, p.white);
    mapPlayer(STATE.black, p.black);
    applyRecord(STATE.white, p.white && p.white.id);
    applyRecord(STATE.black, p.black && p.black.id);
    if(PM_TID && !PM_TOURFETCHED){ PM_TOURFETCHED=true; fetchTournament(PM_TID); }
    render();
  }catch(e){ console.warn(e); }                      // keep last good frame on error
}
async function pollStandings(){
  try{
    const path = PM_TID ? "/tournaments/"+PM_TID+"/standings"
                        : "/meetings/"+CONFIG.pairingsman.meetingId+"/standings";
    const j = await pmFetch(path);
    const rows = (j.data && j.data.standings) || [];
    const map = {};
    for(const row of rows){
      const pid = row.participant_id ?? row.id ?? (row.participant && row.participant.id);
      if(pid!=null) map[pid]=row;
    }
    PM_STANDINGS = map;
  }catch(e){ console.warn(e); }
}

/* ---------- DGT LIVECHESS (board, moves, clocks) ------------------------- */
let GAME=null, GAME_STARTED=false, LC_SERIAL=null, LC_SNAP=null, LC_LAST_W, LC_LAST_B;
function lcClockSec(v){ if(v==null) return null; if(typeof v==="string") return parseClock(v); return v>100000 ? Math.round(v/1000) : Math.round(v); }
function commitMove(m){
  STATE.moves.push(m.san);
  STATE.currentPly = STATE.moves.length-1;
  STATE.lastMove   = { from:m.from, to:m.to };
  STATE.fen        = GAME.fen();
  STATE.toMove     = GAME.turn();
  GAME_STARTED     = true;
  render();
}
/* -------------------------------------------------------------------------
   Move reconstruction from the DGT board feed.
   The eboards feed only gives the current piece PLACEMENT (no move list), so we
   rebuild the moves ourselves. GAME (chess.js) is our source of truth. Guiding
   rule: once we're tracking a game we NEVER throw its moves away. Each new
   placement can only ADD reconstructed move(s) or apply an explicit takeback;
   an unreachable placement (a piece physically mid-move) is simply ignored and
   the last good position is held until the move completes. The one clean reset
   is the standard starting position, which begins a fresh game.
   ------------------------------------------------------------------------- */
const START_PLACEMENT = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR";
let LC_LASTSEEN = null;                                     // last placement processed (dedupes polls)
function placementOf(fen){ return String(fen).split(" ")[0]; }
function pushState(){ STATE.fen=GAME.fen(); STATE.toMove=GAME.turn(); render(); }

function newGameFromStart(){                                // board reset to the initial position
  GAME=new Chess(); STATE.moves=[]; STATE.currentPly=-1; STATE.lastMove=null;
  GAME_STARTED=false; clearTimeout(LC_SNAP); LC_SNAP=null; pushState();
}
function adoptPosition(placement){                          // first sync / last-resort desync recovery
  // We have no trustworthy move history for this position, so start a clean list from here.
  try{ GAME=new Chess(placement+" "+(STATE.toMove||"w")+" - - 0 1"); }catch(e){ return false; }
  STATE.moves=[]; STATE.currentPly=-1; STATE.lastMove=null; pushState(); return true;
}
// Squares that differ between two placements (as algebraic names, e.g. "e4").
function changedSquares(p1,p2){
  const cells=p=>{const o=[];for(const row of p.split("/")){for(const ch of row){ if(/\d/.test(ch)){for(let k=0;k<+ch;k++)o.push("");} else o.push(ch); }}return o;};
  const a=cells(p1), b=cells(p2), files="abcdefgh", set=new Set();
  for(let i=0;i<64;i++){ if(a[i]!==b[i]) set.add(files[i%8]+(8-Math.floor(i/8))); }
  return set;
}
// Forward legal line from the current position to `target`, or null. Depth 1 covers every
// normal move (incl. castling, promotion, en passant); depth 2 recovers the rare case where
// a poll was missed between two moves (e.g. a capture + recapture). Kept deliberately cheap —
// chess.js move generation is slow, so we never do a deep blind search on every poll.
function findSequence(target, maxDepth){
  for(const m of GAME.moves({verbose:true})){            // depth 1: one move reaches it
    GAME.move(m); const hit=placementOf(GAME.fen())===target; GAME.undo();
    if(hit) return [m];
  }
  if(maxDepth<2) return null;
  const changed=changedSquares(placementOf(GAME.fen()),target);   // depth 2: prune to moves that touch the diff
  for(const m of GAME.moves({verbose:true})){
    if(!changed.has(m.from) && !changed.has(m.to)) continue;
    GAME.move(m);
    let found=null;
    for(const m2 of GAME.moves({verbose:true})){
      GAME.move(m2); const hit=placementOf(GAME.fen())===target; GAME.undo();
      if(hit){ found=[m,m2]; break; }
    }
    GAME.undo();
    if(found) return found;
  }
  return null;
}
// Board moved BACKWARD (a takeback of 1..maxBack half-moves). Returns true if applied.
function tryTakeback(target, maxBack){
  const undone=[];
  for(let i=0;i<maxBack;i++){
    const b=GAME.undo(); if(!b) break; undone.push(b);
    if(placementOf(GAME.fen())===target){
      for(let k=0;k<undone.length;k++) STATE.moves.pop();
      const h=GAME.history({verbose:true}), l=h[h.length-1];
      STATE.currentPly=STATE.moves.length-1; STATE.lastMove=l?{from:l.from,to:l.to}:null;
      pushState(); return true;
    }
  }
  for(let i=undone.length-1;i>=0;i--) GAME.move(undone[i]);   // restore — not a takeback
  return false;
}
function applyPlacement(placement){
  placement = placementOf(placement);
  if(placement===LC_LASTSEEN) return;                        // unchanged since last poll (incl. a held transient)
  LC_LASTSEEN = placement;
  clearTimeout(LC_SNAP); LC_SNAP=null;                       // placement changed → cancel any pending recovery

  if(!GAME){                                                 // very first board data: adopt what's on the board
    if(placement===START_PLACEMENT) newGameFromStart(); else adoptPosition(placement);
    return;
  }
  if(placement===START_PLACEMENT){                           // reset to the initial position → fresh game
    if(placementOf(GAME.fen())!==START_PLACEMENT || STATE.moves.length) newGameFromStart();
    return;
  }
  if(placementOf(GAME.fen())===placement) return;            // already in sync

  const seq = findSequence(placement, 2);                    // add the move(s) just played
  if(seq && seq.length){ for(const m of seq){ GAME.move(m); commitMove(m); } return; }
  if(tryTakeback(placement, 2)) return;                      // board went backward

  // Fresh join with an unknown side-to-move: when we adopt a game already in progress we
  // have to guess whose move it is. If that guess was wrong the first real move looks
  // unreachable — so, ONLY while we still have no moves recorded (nothing to lose), try the
  // other side before giving up. This never touches a game we're actually tracking.
  if(STATE.moves.length===0){
    const cur=placementOf(GAME.fen()), other=(GAME.turn()==="w")?"b":"w";
    let test; try{ test=new Chess(cur+" "+other+" - - 0 1"); }catch(e){ test=null; }
    if(test) for(const m of test.moves({verbose:true})){
      test.move(m);
      if(placementOf(test.fen())===placement){ GAME=test; commitMove(m); return; }
      test.undo();
    }
  }

  // Otherwise the placement is UNREACHABLE from the game we're tracking. This is almost
  // always a piece physically mid-move (lifted while the player thinks) — so we simply HOLD
  // the last good position and wait; when the piece lands, that move is added. We NEVER wipe
  // or rebuild the move list here — that was the bug. If the board is ever genuinely out of
  // sync (pieces knocked over / rearranged), reset it to the starting position to resync.
}
function connectLiveChess(){
  const url="ws://"+CONFIG.livechess.host+"/api/v1.0";
  let ws, timer;
  try{ ws=new WebSocket(url); }catch(e){ setTimeout(connectLiveChess,3000); return; }
  ws.onopen=()=>{ timer=setInterval(()=>{ try{ ws.send(JSON.stringify({id:1,call:"eboards"})); }catch(e){} }, CONFIG.livechess.pollMs); };
  ws.onmessage=(ev)=>{
    let msg; try{ msg=JSON.parse(ev.data); }catch(e){ return; }
    let boards = Array.isArray(msg.param) ? msg.param
               : (msg.param && msg.param.board ? [msg.param] : null);
    if(!boards) return;
    let b = CONFIG.livechess.serialnr ? boards.find(x=>String(x.serialnr)===String(CONFIG.livechess.serialnr)) : null;
    if(!b) b = boards.find(x=>x.state==="ACTIVE") || boards[0];
    if(!b) return;
    LC_SERIAL = b.serialnr || LC_SERIAL;
    if(b.board) applyPlacement(b.board);
    if(b.clock){
      // the feed only changes these at move-end; sync ONLY on a real change so the
      // local per-second countdown isn't reset back every poll.
      if(b.clock.white!==LC_LAST_W){ LC_LAST_W=b.clock.white; const s=lcClockSec(b.clock.white); if(s!=null) STATE.white.sec=s; }
      if(b.clock.black!==LC_LAST_B){ LC_LAST_B=b.clock.black; const s=lcClockSec(b.clock.black); if(s!=null) STATE.black.sec=s; }
      // Only tick a clock while the DGT feed says one is running — this is what stops the
      // pre-game countdown. `clock.run` is a BOOLEAN: true while a clock is running, null/
      // false when both are stopped (before the game starts and while it's paused). It does
      // not name a side, so the running clock is simply the side to move. (The feed's white/
      // black values hold steady between moves — confirmed live — so we tick locally and
      // re-sync to the feed only when it changes, at move-end, above.)
      CLOCK_RUN_SIDE = b.clock.run ? STATE.toMove : null;
      paintClocks();
    }
  };
  ws.onclose=()=>{ clearInterval(timer); setTimeout(connectLiveChess,3000); };
  ws.onerror=()=>{ try{ ws.close(); }catch(e){} };
}

/* ---------- BOOT --------------------------------------------------------- */
/* Build marker — check the browser console (F12) to confirm you're on the      */
/* latest overlay and not a stale cached copy.                                  */
console.info("SCC overlay build: never-wipe-moves 2026-07-14b");
/* Pairingsman is the master toggle: ON overrides names/ratings/round/         */
/* tournament/record from the API; OFF keeps whatever you typed in STATE.       */
if(CONFIG.pairingsman.enabled){
  if(CONFIG.pairingsman.token && CONFIG.pairingsman.meetingId){
    STATE.boardNo = "Board "+CONFIG.boardNumber;   // pairing sets it too, once polled
    pollStandings(); pollPairingsman();
    setInterval(pollPairingsman, CONFIG.pairingsman.rosterEverySec*1000);
    setInterval(pollStandings,  CONFIG.pairingsman.standingsEverySec*1000);
  } else {
    console.warn("Pairingsman enabled but token/meetingId missing — staying on the typed STATE values.");
  }
}
if(CONFIG.livechess.host){
  if(typeof Chess==="undefined"){ console.warn("chess.js failed to load — board stays on demo (check internet access for the CDN)."); }
  else connectLiveChess();
}
render();
